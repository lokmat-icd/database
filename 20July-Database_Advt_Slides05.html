function getExpertiseDescription(value) {
    const option = EXPERTISE_OPTIONS.find(opt => opt.value === value);
    return option ? option.description : '';
}

function getCleanSpecialProjects(emp) {
    let projectText = '';
    if (emp.SpecialProjects) {
        if (typeof emp.SpecialProjects === 'object') {
            projectText = emp.SpecialProjects.special_projects || emp.SpecialProjects.job_description || '';
        } else if (typeof emp.SpecialProjects === 'string') {
            projectText = emp.SpecialProjects;
        }
    }
    let cleanText = projectText.trim();
    cleanText = cleanText.replace(/^\s*\*\s*/gm, '');
    cleanText = cleanText.replace(/\n/g, ' ');
    cleanText = cleanText.replace(/\t/g, ' ');
    cleanText = cleanText.replace(/ +/g, ' ');
    cleanText = cleanText.trim();
    return cleanText;
}

// ============================================================
// SAVE EXPERTISE
// ============================================================
function saveExpertise(empEmail, empName) {
    const cleanedEmail = empEmail.replace(/[^a-zA-Z0-9@._-]/g, '_');
    const select = document.getElementById('exp_select_' + cleanedEmail);
    const statusEl = document.getElementById('exp_status_' + cleanedEmail);
    
    if (!select) return;
    
    const selectedValue = select.value;
    
    statusEl.textContent = '⏳ Saving...';
    statusEl.className = 'exp-save-status show saving';
    
    callAPI('saveExpertise', {
        email: loggedInUser.email,
        emp_email: empEmail,
        expertise: selectedValue
    })
    .then(result => {
        if (result.success) {
            const emp = allEmployees.find(e => e.Email === empEmail);
            if (emp) {
                emp.Expertise = selectedValue;
            }
            statusEl.textContent = '✓ Saved';
            statusEl.className = 'exp-save-status show saved';
            updateExpertiseDescription(cleanedEmail, selectedValue);
            showToast('Expertise updated for ' + empName, 'success');
        } else if (result.error === 'Session expired. Please login again.') {
            showToast('Session expired. Please login again.', 'error');
            logout();
        } else {
            statusEl.textContent = '✗ Error';
            statusEl.className = 'exp-save-status show error';
            showToast('Error saving: ' + (result.error || 'Unknown error'), 'error');
        }
        setTimeout(() => {
            statusEl.className = 'exp-save-status';
        }, 2000);
    })
    .catch(error => {
        statusEl.textContent = '✗ Error';
        statusEl.className = 'exp-save-status show error';
        showToast('Error saving: ' + error.message, 'error');
        setTimeout(() => {
            statusEl.className = 'exp-save-status';
        }, 2000);
    });
}

function updateExpertiseDescription(cleanedEmail, value) {
    const descContainer = document.getElementById('exp_desc_' + cleanedEmail);
    if (descContainer) {
        const desc = getExpertiseDescription(value);
        if (desc) {
            descContainer.innerHTML = '<i class="fa fa-info-circle"></i> ' + desc;
        } else {
            descContainer.innerHTML = '<span class="empty">Select an expertise to see description</span>';
        }
    }
}

// SAVE SPECIAL PROJECTS
// ============================================================
function saveSpecialProjects(empEmail, empName) {
    if (!empEmail || empEmail === '') {
        showToast('Error: Employee email missing', 'error');
        return;
    }
    
    const cleanedEmail = empEmail.replace(/[^a-zA-Z0-9@._-]/g, '_');
    const spId = 'sp_' + cleanedEmail;
    
    const textarea = document.getElementById('sp_textarea_' + spId);
    const saveBtn = document.getElementById('sp_save_btn_' + spId);
    
    if (!textarea || !saveBtn) {
        showToast('Error: UI elements not found for ' + empName, 'error');
        return;
    }
    
    const newText = textarea.value;
    
    saveBtn.disabled = true;
    saveBtn.textContent = '⏳ Saving...';
    saveBtn.classList.remove('saved');
    
    callAPI('saveSpecialProjects', {
        email: loggedInUser.email,
        emp_email: empEmail,
        special_projects: newText
    })
    .then(result => {
        if (result.success) {
            const emp = allEmployees.find(e => e.Email === empEmail);
            if (emp) {
                emp.SpecialProjects = { special_projects: newText };
            }

// ============================================================
// UPDATE TEAM WORKLOAD
// ============================================================
function updateTeamWorkload(workplace) {
    const bar = document.getElementById('analysisTeamWorkloadBar');
    const content = document.getElementById('teamWorkloadContent');
    const container = document.getElementById('twContainer');
    const remarkInput = document.getElementById('remarkInput');
    const saveBtn = document.getElementById('remarkSaveBtn');
    const remarkSection = document.getElementById('twRight');
    
    if (!workplace || workplace === '') {
        if (bar) bar.classList.remove('visible');
        return;
    }
    
    // Check if the bar element exists
    if (!bar) return;
    
    callAPI('getWPOWData', { 
        email: loggedInUser.email,
        workplace: workplace 
    })
    .then(result => {
        if (result.success && result.data && result.data.teamWorkload) {
            const teamWorkload = result.data.teamWorkload;
            
            if (typeof teamWorkload !== 'object' || Object.keys(teamWorkload).length === 0) {
                bar.classList.remove('visible');
                return;
            }
            
            const editions = Object.keys(teamWorkload);
            
            let html = '<div class="tw-editions">';
            let grandTotal = 0;
            
            editions.forEach(edition => {
                const data = teamWorkload[edition];
                const main = data.main_pages || 0;
                const hello = data.hello_pages || 0;
                const editionTotal = main + hello;
                grandTotal += editionTotal;
                
                const helloLabel = (edition.toLowerCase().includes('samachar')) ? 'Apna' : 
                                   (edition.toLowerCase().includes('times')) ? 'FIRST' : 'Hello';
                
                html += `<div class="tw-edition">
                    <strong>${escapeHtml(edition)}</strong>: 
                    Main(${main}) + ${helloLabel}(${hello}) = <strong>${editionTotal}</strong> pages
                </div>`;
            });
            
            html += '</div>';
            html += `<div class="tw-total">📄 Total: <strong>${grandTotal}</strong> pages across ${editions.length} editions</div>`;
            
            // Get employees for this workplace
            const workplaceEmployees = allEmployees.filter(emp => emp.WorkPlace === workplace);
            html += `<div class="tw-employees">👥 ${workplaceEmployees.length} employees in this workplace</div>`;
            
            if (content) content.innerHTML = html;
            
            const isAdmin = loggedInUser && loggedInUser.role === 'Admin';
            
            if (container) {
                if (isAdmin) {
                    container.classList.remove('full-width');
                    if (remarkSection) remarkSection.style.display = 'flex';
                    loadRemark(workplace);
                } else {
                    container.classList.add('full-width');
                    if (remarkSection) remarkSection.style.display = 'none';
                }
            }
            
            bar.classList.add('visible');
        } else {
            bar.classList.remove('visible');
        }
    })
    .catch(error => {
        console.error('Error loading team workload:', error);
        if (bar) bar.classList.remove('visible');
    });
}

function renderICDPublications(container) {

        const unitData = data[unit] || [];
        if (unitData.length === 0) return;
        hasData = true;
        
        let totalPages = 0, totalFresh = 0, totalAlter = 0;
        unitData.forEach(row => {
            totalPages += row.Total_Pages || 0;
            totalFresh += row.Fresh_Pagination || 0;
            totalAlter += row.Alter_Pagination || 0;
        });
        
        if (!publicationChanges[unit]) {
            publicationChanges[unit] = {};
        }
        
        html += `
            <div style="margin-bottom:30px;border:1px solid #e8ecf1;border-radius:8px;padding:16px;background:#fafbfc;">
                <div class="section-header" style="margin-bottom:12px;">

                    <div class="totals-box">
                        <span>📄 Total Pages: <span class="num">${totalPages}</span></span>
                        <span>🆕 Fresh: <span class="num">${totalFresh}</span></span>
                        <span>🔄 Alter: <span class="num">${totalAlter}</span></span>
						<span>📢 Advt: <span class="num">400</span></span>
                    </div>
                </div>
                <div class="table-responsive-wrapper">

                                <th>Page Design & PDF Slot</th>
                                <th>Total Pages</th>
                                <th>Fresh</th>
                                <th>Alter</th>
                            </tr>
                        </thead>
                        <tbody>
        `;
        
        unitData.forEach((row, index) => {
            const rowId = 'row_' + index;
            const editorialVal = row.Editorial_Content_Ready || '';
            const designSlotVal = row.Page_Design_PDF_Slot || '';

                               data-row="${rowId}" 
                               data-field="editorial"
                               onchange="onPublicationChange('${escapeHtml(unit)}', '${rowId}', 'editorial', this.value)"
                               placeholder="Editorial Content Ready">
                    </td>
                    <td>
                        <input type="text" class="editable-input text-input ${slotChanged ? 'changed' : ''}" 
                               value="${escapeHtml(designSlotVal)}" 
                               data-unit="${escapeHtml(unit)}" 
                               data-row="${rowId}" 
                               data-field="slot"
                               onchange="onPublicationChange('${escapeHtml(unit)}', '${rowId}', 'slot', this.value)"
                               placeholder="Page Design & PDF Slot">
                    </td>
                    <td>${row.Total_Pages || 0}</td>
                    <td>${row.Fresh_Pagination || 0}</td>
                    <td>${row.Alter_Pagination || 0}</td>
                </tr>
            `;
        });
        
        html += `
                        </tbody>
                        <tfoot>
                            <tr class="total-row">
                                <th>TOTAL</th>
                                <td></td>
                                <td></td>
                                <td>${totalPages}</td>
                                <td>${totalFresh}</td>
                                <td>${totalAlter}</td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
                <div class="save-area">
                    <button class="save-btn" id="savePubBtn_${escapeHtml(unit)}" onclick="savePublication('${escapeHtml(unit)}')">
                        <i class="fa fa-save"></i> Save All Changes
                    </button>
                    <span class="save-status" id="pubStatus_${escapeHtml(unit)}"></span>
                    <span style="font-size:12px;color:#888;margin-left:auto;" id="changeCount_${escapeHtml(unit)}">No changes</span>
                </div>
            </div>
        `;
    });
    
    if (!hasData) {
        container.innerHTML = '<div class="no-data"><i class="fa fa-newspaper-o"></i>No publication data available for your units</div>';
        return;
    }
    
    container.innerHTML = html;
}

function onPublicationChange(unit, rowId, field, value) {
    if (!publicationChanges[unit]) {
        publicationChanges[unit] = {};
    }
    if (!publicationChanges[unit][rowId]) {
        publicationChanges[unit][rowId] = {};
    }
    publicationChanges[unit][rowId][field] = value;
    publicationChanges[unit][rowId]['changed'] = true;
    
    const input = document.querySelector(`[data-unit="${unit}"][data-row="${rowId}"][data-field="${field}"]`);
    if (input) {
        input.classList.add('changed');
    }
    
    updateChangeStatus(unit);
}

function updateChangeStatus(unit) {
    const changes = publicationChanges[unit] || {};
    let count = 0;
    for (let rowId in changes) {
        if (changes[rowId].changed) count++;
    }
    
    const statusEl = document.getElementById('changeCount_' + unit);
    if (statusEl) {
        statusEl.textContent = count > 0 ? `${count} row(s) changed` : 'No changes';
        statusEl.style.color = count > 0 ? '#ff9800' : '#888';
    }
    
    const saveBtn = document.getElementById('savePubBtn_' + unit);
    if (saveBtn) {
        saveBtn.disabled = count === 0;
        saveBtn.classList.toggle('saved', count === 0);
    }
}

async function savePublication(unit) {
    const changes = publicationChanges[unit] || {};
    const hasChanges = Object.keys(changes).some(key => changes[key].changed);
    
    if (!hasChanges) {
        showToast('No changes to save', 'info');
        return;
    }
    
    if (isSaving) return;
    isSaving = true;
    
    const saveBtn = document.getElementById('savePubBtn_' + unit);
    const statusEl = document.getElementById('pubStatus_' + unit);
    
    if (saveBtn) saveBtn.disabled = true;
    if (statusEl) {
        statusEl.className = 'save-status show saving';
        statusEl.textContent = '⏳ Saving...';
    }
    
    const rowsToSave = [];
    for (let rowId in changes) {
        if (changes[rowId].changed) {
            const table = document.getElementById('pubTable_' + unit);
            if (table) {
                const row = table.querySelector('#' + rowId);
                if (row) {
                    const edition = row.querySelector('td:first-child strong')?.textContent || '';
                    rowsToSave.push({
                        edition: edition,
                        editorial: changes[rowId].editorial || '',
                        slot: changes[rowId].slot || ''
                    });
                }
            }
        }
    }
    
    try {
        const result = await callAPI('savePublication', {
            email: loggedInUser.email,
            unit: unit,
            rows: rowsToSave
        });
        
        if (result.success) {
            publicationChanges[unit] = {};
            updateChangeStatus(unit);
            
            document.querySelectorAll(`[data-unit="${unit}"]`).forEach(input => {
                input.classList.remove('changed');
            });
            
            if (statusEl) {
                statusEl.className = 'save-status show saved';
                statusEl.textContent = '✓ Saved successfully';
            }
            showToast('Publication data saved successfully!', 'success');
            
            setTimeout(() => {
                if (statusEl) statusEl.className = 'save-status';
            }, 3000);
        } else if (result.error === 'Session expired. Please login again.') {
            showToast('Session expired. Please login again.', 'error');
            logout();
        } else {
            if (statusEl) {
                statusEl.className = 'save-status show error';
                statusEl.textContent = '✗ Error: ' + (result.error || 'Unknown error');
            }
            showToast('Error saving: ' + (result.error || 'Unknown error'), 'error');
        }
    } catch(error) {
        if (statusEl) {
            statusEl.className = 'save-status show error';
            statusEl.textContent = '✗ Error: ' + error.message;
        }
        showToast('Error saving: ' + error.message, 'error');
    }
    
    isSaving = false;
    if (saveBtn) saveBtn.disabled = false;
}

// ============================================================
// TOAST NOTIFICATION
// ============================================================
function showToast(message, type) {
    const existing = document.querySelector('.custom-toast');
    if (existing) existing.remove();
    
    const toast = document.createElement('div');
    toast.className = 'custom-toast ' + (type || 'info');
    toast.textContent = message;
    document.body.appendChild(toast);
    
    setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(10px)';
        setTimeout(() => toast.remove(), 400);
    }, 3000);
}

// ============================================================
// HELPER: Escape HTML
// ============================================================
function escapeHtml(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

// ============================================================
document.addEventListener('DOMContentLoaded', function() {
    // Initialize login listeners
    document.getElementById('loginPassword').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') handleLogin();
    });
    document.getElementById('loginEmail').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') document.getElementById('loginPassword').focus();
    });
});
</script>
